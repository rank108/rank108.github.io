<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locked In Till June</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            overflow-x: hidden;
            background: #0a0a0f;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(circle at 20% 50%, rgba(30, 40, 60, 0.4) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(40, 30, 60, 0.3) 0%, transparent 50%),
                        radial-gradient(circle at 40% 20%, rgba(20, 35, 55, 0.3) 0%, transparent 50%);
        }

        .shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.15;
            animation: float 20s infinite ease-in-out;
        }

        .shape:nth-child(1) {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #1e3a5f, #2c4a6e);
            top: 10%;
            left: 10%;
            animation-delay: 0s;
            animation-duration: 25s;
        }

        .shape:nth-child(2) {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #2c3e5a, #1a2e4a);
            top: 60%;
            right: 10%;
            animation-delay: 5s;
            animation-duration: 30s;
        }

        .shape:nth-child(3) {
            width: 250px;
            height: 250px;
            background: linear-gradient(135deg, #3a4a5f, #2a3a5a);
            bottom: 20%;
            left: 50%;
            animation-delay: 10s;
            animation-duration: 35s;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(30px, -30px) scale(1.1);
            }
            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }
        }

        .container {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            padding: 40px 20px;
        }

        .card {
            background: rgba(20, 25, 35, 0.5);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 60px 50px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4),
                        0 0 80px rgba(30, 50, 80, 0.1),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .title {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 16px;
            text-align: center;
            background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 1.125rem;
            line-height: 1.7;
            color: #94a3b8;
            text-align: center;
            margin-bottom: 50px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        .countdown {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 50px;
        }

        .time-unit {
            text-align: center;
            padding: 24px 16px;
            background: rgba(30, 40, 60, 0.3);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .time-unit:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(40, 50, 70, 0.4);
        }

        .time-value {
            font-size: 3rem;
            font-weight: 700;
            color: #ffffff;
            display: block;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.1);
        }

        .time-label {
            font-size: 0.875rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 500;
        }

        .quote {
            text-align: center;
            font-size: 1rem;
            color: #7c8fa8;
            font-style: italic;
            line-height: 1.6;
            margin-top: 20px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .footer {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 30px 20px;
            font-size: 0.875rem;
            color: #475569;
            letter-spacing: 0.05em;
        }

        @media (max-width: 768px) {
            .card {
                padding: 40px 30px;
                border-radius: 24px;
            }

            .title {
                font-size: 2.25rem;
            }

            .subtitle {
                font-size: 1rem;
                margin-bottom: 40px;
            }

            .countdown {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }

            .time-unit {
                padding: 20px 12px;
            }

            .time-value {
                font-size: 2.5rem;
            }

            .time-label {
                font-size: 0.75rem;
            }

            .quote {
                font-size: 0.9rem;
            }

            .shape:nth-child(1),
            .shape:nth-child(2),
            .shape:nth-child(3) {
                width: 200px;
                height: 200px;
            }
        }

        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }

            .title {
                font-size: 1.75rem;
            }

            .subtitle {
                font-size: 0.9rem;
            }

            .time-value {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="background"></div>

    <div class="shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="container">
        <div class="card">
            <h1 class="title">LOCKED IN TILL JUNE</h1>
            <p class="subtitle">Our shared countdown to better habits, harder training, smarter eating, and feeling stronger and more confident by summer 2026.</p>

            <div class="countdown">
                <div class="time-unit">
                    <span class="time-value" id="days">000</span>
                    <span class="time-label">Days</span>
                </div>
                <div class="time-unit">
                    <span class="time-value" id="hours">00</span>
                    <span class="time-label">Hours</span>
                </div>
                <div class="time-unit">
                    <span class="time-value" id="minutes">00</span>
                    <span class="time-label">Minutes</span>
                </div>
                <div class="time-unit">
                    <span class="time-value" id="seconds">00</span>
                    <span class="time-label">Seconds</span>
                </div>
            </div>

            <div class="quote">
                "Discipline is choosing between what you want now and what you want most."
            </div>
        </div>
    </div>

    <footer class="footer">
        Final day: June 1, 2026
    </footer>

    <script>
        const targetDate = new Date('June 1, 2026 00:00:00').getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.getElementById('days').textContent = '000';
                document.getElementById('hours').textContent = '00';
                document.getElementById('minutes').textContent = '00';
                document.getElementById('seconds').textContent = '00';
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = String(days).padStart(3, '0');
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
